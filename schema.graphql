
enum JOB_TYPE {
	FULL_TIME
	PART_TIME
	FREELANCE
	CONTRACT
}

enum STATUS_TYPE {
	FEATURED
	NEW
	OLD
	CLOSED
}

enum ROLE_TYPE {
	NORMAL
	ADMIN
}

type File {
	id: ID!
	url: String!
}

type AuthData {
	user: User!
	token: String!
	expiresIn: Int!
}

type User {
	id: ID!
	email: String!
	password: String
	role: ROLE_TYPE!
	company: Company!
	createdAt: String!
}

type Company {
	id: ID!
	createdBy: User
	email: String!
	name: String!
	website: String!
	logo: File
	jobs: [Job!]!
}

type Invoice {
	id: ID!
	job: Job! 
	last_four_digits: Int!
	price: Int!
	status: String!
	receipt_url: String!
	createdAt: String!
	updatedAt: String!
}

type Job {
	id: ID!
	position: String!
	location: String!
	salary: Int!
	job_type: JOB_TYPE!
	status: STATUS_TYPE!
	apply_url: String!
	company: Company
	company_logo: File
	company_name: String
	company_email: String
	company_website: String
	invoices: [Invoice!]!
	createdAt: String!
	description: String!
	expiresAt: String!
}

input CreateJob {
	position: String!
	location: String!
	salary: Int!
	job_type: JOB_TYPE!
	status: STATUS_TYPE!
	apply_url: String!
	description: String!
	company: ID
	company_logo: String!
	company_name: String
	company_email: String
	company_website: String
}

input FileInput {
	base64: String!
	mimetype: String!
}

type BasicInfo {
	success: Boolean!
}

input CreateCompanyInput {
	email: String!
	logo: String
	name: String!
	website: String!
	job: CreateJob
}

input JobFilterInput {
	id_not_in: [ID!]
	status_not_in: [STATUS_TYPE!]
	location_contains: String
	status_type: STATUS_TYPE
	job_type: JOB_TYPE
	createdAt_gte: String
	createdAt_lte: String
	first: Int
	skip: Int
	orderBy: String
}

type Query {
	getLoggedInUser: User
	company(id: ID!): Company
	jobs(jobFilter:JobFilterInput): [Job!]!
	job(id: ID!): Job!
	invoices: [Invoice!]!
}

type CreateJobAndLoginInfo {
	auth_data: AuthData!
	job: Job!
}

type Mutation {
	login(
		email: String!
		password: String!
	): AuthData!

	register(
		email: String!
		password: String!
		company: CreateCompanyInput!
		job: ID!
	): AuthData!

	updateUser(
		email: String
		password: String
	): User!

	updateCompany(
		email: String
		name: String
		website: String
		logo: String
	): Company!

	renewJob(
		id: ID!
		stripe_token: String!
		featured: Boolean!
	): Job!

	createJob(
		position: String!
		location: String!
		salary: Int!
		job_type: JOB_TYPE!
		status: STATUS_TYPE!
		apply_url: String!
		description: String
		company: ID
		company_logo: String
		company_name: String
		company_email: String
		company_website: String
		stripe_token: String
		bp: Boolean!
	): Job!

	createJobAndLogin(
		email: String!
		password: String!
		position: String!
		location: String!
		salary: Int!
		job_type: JOB_TYPE!
		status: STATUS_TYPE!
		apply_url: String!
		description: String!
		stripe_token: String!
	): CreateJobAndLoginInfo!

	updateJob(
		id: ID!
		position: String
		description: String
		location: String
		salary: Int
		job_type: JOB_TYPE
		apply_url: String
	): Job!

	deleteJob(
		id: ID!
	): Job!
}